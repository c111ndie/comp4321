server.port=8080

# Path to the JDBM database files (without extension)
# Run the spider first to create these files, then start the webapp from the same working directory.
search.db-name=indexDB

# Path to stopwords file
search.stopwords=stopwords.txt

# JSP Configuration
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

spring.mvc.static-path-pattern=/static/**
spring.web.resources.static-locations=classpath:/static/

# Temporary preview endpoints for the UI before the real search engine is merged.
# Set to false when the real /api/search and /api/suggest implementations are ready.
webapp.mock-search.enabled=true
