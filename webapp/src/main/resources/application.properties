server.port=8080

# Path to the JDBM database files (without extension)
# Run the spider first to create these files, then start the webapp from the same working directory.
search.db-name=spider/crawl-output/indexDB

# Path to stopwords file
search.stopwords=spider/src/main/resources/stopwords.txt

# Thymeleaf Configuration (works with embedded Tomcat)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

spring.web.resources.static-locations=classpath:/static/

# Set to false to use the real JDBM-backed search engine (RealSearchController).
# Set to true to use the mock search engine (MockSearchController).
webapp.mock-search.enabled=false
